<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="1">
        <caption>Student Report</caption>

        <thead>
            <tr>
                <th rowspan="2">Roll no</th>
                <th rowspan="2">Name</th>
                <th rowspan="2">Marks</th>
            </tr>
            <tr>
                <th>Math</th>
                <th>English</th>
                <th>Science</th>
            </tr>
        </thead>

        
    </table>
</body>
</html>
